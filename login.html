<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body{
    margin:0;
    background:#000;
    color:#fff;
    font-family:sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
#stars{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:-1;
}
.box{
    width:90%;
    max-width:400px;
    background:#111;
    padding:30px;
    border-radius:12px;
    box-shadow:0 0 20px rgba(255,255,255,0.05);
    text-align:center;
}

h2{
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    margin-bottom:15px;
    font-size:15px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:#fff;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

.warning{
    font-size:12px;
    color:#aaa;
    margin-top:15px;
}
.google-btn{
    margin-top:15px;
    background:#fff;
    color:#000;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    font-weight:500;
}

.google-btn img{
    width:20px;
}
/* Loading Spinner */
#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
align-items:center;
justify-content:center;
z-index:999;
}

.spinner{
width:40px;
height:40px;
border:4px solid rgba(255,255,255,0.2);
border-top:4px solid white;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}
</style>

<script>
/* ðŸ”¥ AUTO REDIRECT IF ALREADY LOGGED */
if(localStorage.getItem("userEmail")){
document.addEventListener("DOMContentLoaded",()=>{
document.getElementById("loader").style.display="flex";
setTimeout(()=>{
window.location.href="index.html";
},800);
});
}
</script>
</head>

<body>
<div id="loader">
<div class="spinner"></div>
</div>
<canvas id="stars"></canvas>
<div class="box">
    <h2>Continue with Email</h2>

    <input type="email" id="email" placeholder="Enter your email">

    <button onclick="login()">Continue</button>
  <button id="googleBtn" class="google-btn">
     <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg">
   Continue with Google
</button>
    <div class="warning">
Please continue with your Google account or your permanent email.<br><br>
This website securely stores your present challenge for future memories.
</div>
</div>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { 
getAuth, 
GoogleAuthProvider, 
signInWithPopup,
signInWithEmailAndPassword,
createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyAqtkCHpIelkDUsm2pPiZjmW6RqSXXGoZY",
authDomain: "vipsmind-b34fc.firebaseapp.com",
projectId: "vipsmind-b34fc",
storageBucket: "vipsmind-b34fc.firebasestorage.app",
messagingSenderId: "257825847385",
appId: "1:257825847385:web:ee3592957535a99e915948"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

window.login = function(){

const email=document.getElementById("email").value.trim();

if(!email){
alert("Please enter your email");
return;
}

const password="vipsmind_user";

signInWithEmailAndPassword(auth,email,password)
.then((userCredential)=>{

localStorage.setItem("userEmail",userCredential.user.email);
document.getElementById("loader").style.display="flex";
setTimeout(()=>{
window.location.href="index.html";
},800);

})
.catch(()=>{

createUserWithEmailAndPassword(auth,email,password)
.then((userCredential)=>{

localStorage.setItem("userEmail",userCredential.user.email);
document.getElementById("loader").style.display="flex";
setTimeout(()=>{
window.location.href="index.html";
},800);

})
.catch((error)=>{
alert(error.message);
});

});

};

document.getElementById("googleBtn").addEventListener("click", () => {

signInWithPopup(auth, provider)
.then((result) => {

localStorage.setItem("userEmail", result.user.email);
document.getElementById("loader").style.display="flex";
setTimeout(()=>{
window.location.href="index.html";
},800);

})
.catch(() => {

alert("Google Sign-in Failed");

});

});

</script>

<script>
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const stars = [];

for (let i = 0; i < 200; i++) {
    stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.5
    });
}

function drawStars(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="white";

    stars.forEach(star=>{
        ctx.beginPath();
        ctx.arc(star.x,star.y,star.r,0,Math.PI*2);
        ctx.fill();
    });
}

drawStars();

</script>
</body>
</html>
