<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VipsMind</title>

<style>

body{
margin:0;
background:#000;
font-family:Arial, sans-serif;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
color:#fff;
}

/* layout */

.container{
display:flex;
align-items:center;
gap:60px;
max-width:900px;
width:95%;
}

/* VIP image */

.vip img{
width:220px;
display:block;
filter:drop-shadow(0 0 40px black);
}

/* speech bubble */

.bubble{
background:#f5f5f5;
color:#111;
padding:28px;
border-radius:14px;
width:420px;
position:relative;
box-shadow:0 15px 40px rgba(0,0,0,0.7);
}

/* arrow */

.bubble:before{
content:"";
position:absolute;
left:-16px;
top:50px;
border-width:10px;
border-style:solid;
border-color:transparent #f5f5f5 transparent transparent;
}

/* text */
#text{
min-height:220px;
white-space:pre-line;
font-size:17px;
line-height:1.8;
letter-spacing:0.5px;
font-weight:500;
font-family: "Segoe UI", "Poppins", sans-serif;
}
#text::first-letter{
font-size:22px;
font-weight:600;
}

/* buttons */

.buttons{
margin-top:20px;
display:none;
}

button{
padding:12px 22px;
border:none;
border-radius:6px;
font-size:14px;
cursor:pointer;
margin-right:10px;
}

.yes{
background:#0d6efd;
color:white;
}

.no{
background:#444;
color:white;
}

button:hover{
opacity:0.9;
}

</style>
</head>

<body>

<div class="container">

<!-- VIP IMAGE -->
<div class="vip">
<img src="./vip.png.jpg">
</div>

<!-- SPEECH -->
<div class="bubble">

<div id="text"></div>

<div class="buttons" id="buttons">
<button class="yes" onclick="enter()">Yes I am VIP</button>
<button class="no" onclick="exitSite()">No I am not VIP</button>
</div>

</div>

</div>

<script>
if(localStorage.getItem("seenIntro")){
    window.location.replace("login.html");
}

const message =
"Hi Mr/Miss,\n\n"+
"I am Vip.\n\n"+
"Welcome to VipsMind.\n\n"+
"Before you enter...\n\n"+
"remember...\n\n"+
"VipsMind is not a time pass website.\n"+
"It is a place to create challenges and memories.\n\n"+
"If you are here just for time pass,\n"+
"I think this experience may not fully match what you are looking for.\n"+
"But you are always welcome to explore VipsMind and decide for yourself.\n\n"+
"But if you are serious about your challenge...\n\n"+
"Then you are our VIP.";

let i = 0;

function typeText(){
if(i < message.length){
document.getElementById("text").innerHTML += message.charAt(i);
i++;
setTimeout(typeText,28);
}else{
document.getElementById("buttons").style.display="block";
}
}

typeText();

/* YES  LOGIN */
function enter(){
localStorage.setItem("seenIntro","yes");
window.location.replace("login.html");
}
/* NO  EXIT */
function exitSite(){
    sessionStorage.setItem("exitPressed","yes");

    if (window.history.length > 1) {
        history.back();
    } else {
        window.location.href = "about:blank";
    }
}
</script>

</body>
</html>
