<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VipsMind</title>

<style>

body{
margin:0;
background:#000;
font-family:Arial, sans-serif;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
color:#fff;
}

/* layout */

.container{
display:flex;
align-items:center;
gap:60px;
max-width:900px;
width:95%;
}

/* VIP image */

.vip img{
width:220px;
display:block;
filter:drop-shadow(0 0 40px black);
}

/* speech bubble */

.bubble{
background:#f5f5f5;
color:#111;
padding:28px;
border-radius:14px;
width:420px;
position:relative;
box-shadow:0 15px 40px rgba(0,0,0,0.7);
}

/* arrow */

.bubble:before{
content:"";
position:absolute;
left:-16px;
top:50px;
border-width:10px;
border-style:solid;
border-color:transparent #f5f5f5 transparent transparent;
}

/* text */

#text{
min-height:220px;
white-space:pre-line;
font-size:16px;
line-height:1.6;
}

/* buttons */

.buttons{
margin-top:20px;
display:none;
}

button{
padding:12px 22px;
border:none;
border-radius:6px;
font-size:14px;
cursor:pointer;
margin-right:10px;
}

.yes{
background:#0d6efd;
color:white;
}

.no{
background:#444;
color:white;
}

button:hover{
opacity:0.9;
}

</style>
</head>

<body>

<div class="container">

<!-- VIP IMAGE -->
<div class="vip">
<img src="./vip.png">
</div>

<!-- SPEECH -->
<div class="bubble">

<div id="text"></div>

<div class="buttons" id="buttons">
<button class="yes" onclick="enter()">Yes I am VIP</button>
<button class="no" onclick="exitSite()">No I am not VIP</button>
</div>

</div>

</div>

<script>

const message =
"Hi Mr/Miss 😄\n\n"+
"I am Vip.\n\n"+
"I will guide you through the VipsMind website.\n\n"+
"But remember...\n\n"+
"VipsMind is not a time pass website.\n"+
"It is a place to create challenges and memories.\n\n"+
"If you came here to time pass,\n"+
"you can leave now.\n\n"+
"But if you are serious about your challenge...\n\n"+
"Then you are a VIP.";

let i = 0;

function typeText(){
if(i < message.length){
document.getElementById("text").innerHTML += message.charAt(i);
i++;
setTimeout(typeText,28);
}else{
document.getElementById("buttons").style.display="block";
}
}

typeText();

/* YES → LOGIN */
function enter(){
window.location.href = "login.html";
}

/* NO → EXIT */
function exitSite(){
window.open('', '_self');
window.close();
}

</script>

</body>
  </html>
