<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Single</title>

<style>
body {
  background: #000;
  color: #fff;
  font-family: sans-serif;
}

.box {
  margin: 80px auto;
  width: 90%;
  max-width: 400px;
  border: 1px solid #333;
  padding: 25px;
  border-radius: 10px;
  text-align: center;
}

textarea {
  width: 100%;
 height: 260px;     /* bigger writing area */
  padding: 28px;
  border-radius: 16px;/* straight square */
  resize: none;
}
input[type="text"] {
  width: 100%;
  padding: 14px;
  border-radius: 16px;
  border: none;
  margin-bottom: 14px;
  font-size: 14px;
}
input[type="datetime-local"] {
  width: 100%;
  padding: 14px;
  border-radius: 16px;
  border: none;
  font-size: 14px;
  margin-bottom: 18px;
}
 button {
  background: #0d6efd;
  color: #fff;
  border: none;
  padding: 16px;
  width: 100%;
  border-radius: 16px;
  font-size: 16px;
  margin-top: 25px;
}
</style>
</head>

<body>

<div class="box">
  <h2 id="title">Write Your Letter</h2>
<input type="text" id="username" placeholder="Please enter your Name">
  <textarea id="letter" placeholder="Write..."></textarea>

  <input type="datetime-local" id="unlock" style="display:none;">

  <button id="actionBtn">Continue to Timer</button>
</div>

<script>

const actionBtn = document.getElementById("actionBtn");
const letter = document.getElementById("letter");
const username = document.getElementById("username");
const unlock = document.getElementById("unlock");
const title = document.getElementById("title");

let step = 1;

actionBtn.onclick = function () {

  if (step === 1) {
if (!username.value.trim()) {
    alert("Enter your name");
    return;
}

if (!letter.value.trim()) {
    alert("Write your letter first");
    return;
}

    username.style.display = "none";
letter.style.display = "none";
unlock.style.display = "block";
    title.innerText = "Set Unlock Timer";
    actionBtn.innerText = "Place Challenge";
    step = 2;

  } else {

if (!unlock.value) {
    alert("Select date");
    return;
}

localStorage.setItem("singleName", username.value);
localStorage.setItem("letter", letter.value);
localStorage.setItem("lockTime", Date.now());
localStorage.setItem("unlockTime", new Date(unlock.value).getTime());
localStorage.setItem("challengeMode", "single");
localStorage.setItem("challengeStatus", "locked");
localStorage.removeItem("groupLetters");
localStorage.removeItem("groupVideos");
alert("Challenge Placed Successfully");
window.location.href = "goals.html";
  }

};

</script>

</body>
    </html>
