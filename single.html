<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Single</title>

<style>
body {
  background: #000;
  color: #fff;
  font-family: sans-serif;
}

.box {
  margin: 80px auto;
  width: 90%;
  max-width: 400px;
  border: 1px solid #333;
  padding: 25px;
  border-radius: 10px;
  text-align: center;
}

textarea {
  width: 100%;
 height: 260px;     /* bigger writing area */
  padding: 28px;
  border-radius: 16px;/* straight square */
  resize: none;
}
input[type="text"] {
  width: 100%;
  padding: 14px;
  border-radius: 16px;
  border: none;
  margin-bottom: 14px;
  font-size: 14px;
}
input[type="datetime-local"] {
  width: 100%;
  padding: 14px;
  border-radius: 16px;
  border: none;
  font-size: 14px;
  margin-bottom: 18px;
}
 button {
  background: #0d6efd;
  color: #fff;
  border: none;
  padding: 16px;
  width: 100%;
  border-radius: 16px;
  font-size: 16px;
  margin-top: 25px;
}
/* Page Loader */
#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

.spinner{
width:40px;
height:40px;
border:4px solid rgba(255,255,255,0.2);
border-top:4px solid white;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}
</style>
</head>

<body>
<div id="loader">
<div class="spinner"></div>
</div>
<div class="box">
  <h2 id="title">Write Your Letter</h2>
<input type="text" id="username" placeholder="Please enter your Name">
  <textarea id="letter" placeholder="Write..."></textarea>

  <input type="datetime-local" id="unlock" style="display:none;">

  <button id="actionBtn">Continue to Timer</button>
</div>

<script>
<!-- EXIT POPUP -->
<div id="exitPopup" style="
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(6px);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
">

  <div style="
  width:85%;
  max-width:320px;
  background:#111;
  padding:20px;
  border-radius:12px;
  position:relative;
  text-align:center;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
  ">

    <!-- âŒ Cancel -->
    <div onclick="closeExit()" style="
    position:absolute;
    top:10px;
    right:12px;
    font-size:18px;
    cursor:pointer;
    color:#aaa;
    ">âœ•</div>

    <h3 style="margin-bottom:10px;">Exit Confirmation</h3>

    <p style="font-size:14px; color:#ccc; line-height:1.5;">
    Are you sure you want to exit?<br>
    If you leave now, your current progress will be lost and you will need to start again when you return.
    </p>

    <!-- ðŸ”™ Back Button -->
    <button onclick="confirmExit()" style="
    margin-top:18px;
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    font-size:15px;
    cursor:pointer;
    ">
    Back
    </button>

  </div>
</div>

<script>
// BLOCK BACK BUTTON + SHOW POPUP
history.pushState(null, null, location.href);

window.onpopstate = function () {
    document.getElementById("exitPopup").style.display = "flex";
    history.pushState(null, null, location.href);
};

// CLOSE POPUP
function closeExit() {
    document.getElementById("exitPopup").style.display = "none";
}

// CONFIRM EXIT â†’ GO HOME
function confirmExit() {
    window.location.replace("index.html");
}

const actionBtn = document.getElementById("actionBtn");
const letter = document.getElementById("letter");
const username = document.getElementById("username");
const unlock = document.getElementById("unlock");
const title = document.getElementById("title");

let step = 1;

actionBtn.onclick = function () {

  if (step === 1) {
if (!username.value.trim()) {
    alert("Enter your name");
    return;
}

if (!letter.value.trim()) {
    alert("Write your letter first");
    return;
}

    username.style.display = "none";
letter.style.display = "none";
unlock.style.display = "block";
    title.innerText = "Set Unlock Timer";
    actionBtn.innerText = "Place Challenge";
    step = 2;

  } else {

if (!unlock.value) {
    alert("Select date");
    return;
}

localStorage.setItem("singleName", username.value.trim());
localStorage.setItem("letter", letter.value);
localStorage.setItem("lockTime", Date.now());
localStorage.setItem("unlockTime", new Date(unlock.value).getTime());
localStorage.setItem("challengeMode", "single");
localStorage.setItem("challengeStatus", "locked");
localStorage.removeItem("groupLetters");
localStorage.removeItem("groupVideos");
alert("Challenge Placed Successfully");

document.getElementById("loader").style.display="flex";

setTimeout(()=>{
window.location.replace("goals.html");
},600);
  }

};

</script>

</body>
</html>
