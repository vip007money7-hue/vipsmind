<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Future Self</title>
<style>
body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    color: white;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  background: #000000;
}
   #stars {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    background: radial-gradient(
        ellipse at center,
        rgba(255,255,255,0.08) 0%,
        rgba(255,255,255,0.03) 25%,
        #000 60%,
        #000 100%
    );
}
/* brand */
.brand {
  position: absolute;
  top: 12px;
  width: 100%;
  text-align: center;
  font-size: 14px;
  opacity: 0.9;
}

 /* GOALS tag */
  .goals-wrap {
  position: absolute;
  top: 66px;        /* EXACT: 1 inch below Vip’smind */
  left: 0;
  width: 100%;
}

 .goals-tag {
  position: absolute;
  left: 94px;     /* LEFT SIDE – FIXED */
  top: 0;
  background: #ffffff;
  color: #000;
  padding: 10px 22px 10px 36px;
  border-radius: 14px;
  font-weight: 600;
  display: inline-flex;
  align-items: center;
  z-index: 9999;
}
 

/* left arrow cut */
 .goals-tag::after {
   content: "";
 position: absolute;
   right: -20px;
   top: 0;
   width: 0;
   height: 0;
  border-top: 22px solid transparent;
   border-bottom: 22px solid transparent;
   border-left: 20px solid #ffffff;
}


/* center message */
.message {
  position: absolute;
 top: 180px;      /* EXACT: text moved down */
  width: 100%;
  text-align: center;
  font-size: 40px;
}

/* buttons */
.actions {
  position: absolute;
  top:  250px;
  width: 100%;
  display: flex;
  justify-content: center;
  gap: 60px;
}

.single {
  background-color: #0b5cff;
  padding: 16px 36px;
  border-radius: 6px;
  box-shadow:
    0 0 6px rgba(11,92,255,0.35),
    0 0 14px rgba(11,92,255,0.25);
}

.group {
  background-color: #b1122a;
  padding: 16px 36px;
  border-radius: 6px;
  box-shadow:
    0 0 6px rgba(177,18,42,0.35),
    0 0 14px rgba(177,18,42,0.25);
}

/* footer text */
.timer {
    position: absolute;
    top: 380px;
    width: 100%;
    text-align: center;
    font-size: 36px;
    color: #aaa;
}
/* Page Loader */
#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

.spinner{
width:40px;
height:40px;
border:4px solid rgba(255,255,255,0.2);
border-top:4px solid white;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}
.reminderBtn{
position:fixed;
top:20px;
right:20px;
padding:10px 18px;
background:#ffffff;
color:#000;
border:none;
border-radius:6px;
font-size:13px;
font-weight:600;
cursor:pointer;
z-index:9999;
box-shadow:0 0 10px rgba(255,255,255,0.2);
}
/* STICKER */
.sticker{
position:absolute;
top:240px;
width:100%;
text-align:center;
font-size:28px;
letter-spacing:3px;
color:#fff;
padding:10px;
display:none;
}
/* POPUP */
.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

.popupBox{
background:#111;
padding:20px;
border-radius:12px;
text-align:center;
}

.popupBox input{
padding:10px;
width:200px;
margin-bottom:15px;
border:none;
border-radius:6px;
}

.themes{
display:flex;
gap:10px;
margin-bottom:15px;
justify-content:center;
}

.theme{
width:40px;
height:40px;
border-radius:8px;
cursor:pointer;
}

.t1{background:linear-gradient(135deg,#000,#1a1a1a);}
.t2{background:linear-gradient(135deg,#000,#0f2027);}
.t3{background:linear-gradient(135deg,#000,#2c003e);}
.t4{background:linear-gradient(135deg,#000,#1f1f1f);}
</style>
</head>
<body>
<div id="loader">
<div class="spinner"></div>
</div>
<canvas id="stars"></canvas>
<div class="brand">Vip’smind</div>
 <div class="message">A MESSAGE TO YOUR FUTURE SELF</div>
 <div id="reminderSticker" class="sticker"></div>

<button id="reminderBtn" class="reminderBtn" style="display:none;">
Select Reminder
</button>
<div class="goals-wrap">
   <div class="goals-tag">GOALS</div>
   <div class="actions">
  <div class="single" id="singleBtn">Single</div>
<div class="group" id="groupBtn">Group</div>
   </div>
   <div class="timer" id="timer"></div>
 </div>
 <script defer>
const savedEmail = localStorage.getItem("userEmail");

if (!savedEmail) {
    window.location.href = "login.html";
}

const timerEl = document.getElementById("timer");
const singleBtn = document.getElementById("singleBtn");
const groupBtn = document.getElementById("groupBtn");
const goalsBtn = document.querySelector(".goals-tag");

const unlockTime = Number(localStorage.getItem("unlockTime"));

/* GOALS BUTTON */
goalsBtn.onclick = function () {

    if (!unlockTime || unlockTime <= 0) {

        // blink effect
        timerEl.style.transition = "0.2s";
        timerEl.style.transform = "scale(1.2)";
        setTimeout(() => {
            timerEl.style.transform = "scale(1)";
        }, 200);

        setTimeout(() => {
            timerEl.style.transform = "scale(1.2)";
        }, 400);

        setTimeout(() => {
            timerEl.style.transform = "scale(1)";
        }, 600);

        return;
    }

    window.location.href = "goals.html";
};


/* SINGLE BUTTON */
singleBtn.onclick = function () {

    document.getElementById("loader").style.display="flex";

    localStorage.setItem("challengeMode", "single");

    setTimeout(()=>{
        window.location.href = "type.html";
    },600);

};


/* GROUP BUTTON */
groupBtn.onclick = function () {

    document.getElementById("loader").style.display="flex";

    localStorage.setItem("challengeMode", "group");

    setTimeout(()=>{
        window.location.href = "type.html";
    },600);

};


function updateUI() {

    if (!unlockTime || unlockTime <= 0) {
        timerEl.innerText = "No challenge placed";
        singleBtn.style.display = "inline-block";
        groupBtn.style.display = "inline-block";
        return;
    }

    const now = Date.now();

    if (now >= unlockTime) {

        timerEl.innerHTML =
            "Challenge is unlocked<br><br>Please check the challenge in Goals";

        singleBtn.style.display = "none";
        groupBtn.style.display = "none";
        return;
    }

    // LOCKED STATE
    singleBtn.style.display = "none";
    groupBtn.style.display = "none";

    const diff = unlockTime - now;

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const minutes = Math.floor((diff / (1000 * 60)) % 60);
    const seconds = Math.floor((diff / 1000) % 60);

    timerEl.innerHTML =
        "The Challenge is Locked<br><br>" +
        "Days : " + days +
        " | Hours : " + hours +
        " | Minutes : " + minutes +
        " | Seconds : " + seconds +
        "<br><br>To Unlock";
}

updateUI();
setInterval(updateUI, 1000);


const reminderBtn = document.getElementById("reminderBtn");
const popup = document.getElementById("reminderPopup");
const sticker = document.getElementById("reminderSticker");

let selectedTheme = "t1";

/* SHOW BUTTON ONLY WHEN TIMER ACTIVE */
function checkReminderVisibility(){
if(unlockTime && unlockTime > Date.now()){
    reminderBtn.style.display="block";
}else{
    reminderBtn.style.display="none";
}
}
checkReminderVisibility();

/* OPEN POPUP */
reminderBtn.addEventListener("click", () => {
popup.style.display="flex";
};

/* SELECT THEME */
window.selectTheme = function(t){
selectedTheme = t;
}

/* SAVE */
saveReminder window.saveReminder = function(){

let text = document.getElementById("reminderInput").value;

if(!text.trim()) return;

text = text.toUpperCase();

localStorage.setItem("reminderText", text);
localStorage.setItem("reminderTheme", selectedTheme);

applySticker(text, selectedTheme);

popup.style.display="none";
}

/* APPLY */
function applySticker(text, theme){

sticker.innerText = text;

if(theme==="t1") sticker.style.background="linear-gradient(135deg,#000,#1a1a1a)";
if(theme==="t2") sticker.style.background="linear-gradient(135deg,#000,#0f2027)";
if(theme==="t3") sticker.style.background="linear-gradient(135deg,#000,#2c003e)";
if(theme==="t4") sticker.style.background="linear-gradient(135deg,#000,#1f1f1f)";

sticker.style.display="inline-block";
sticker.style.borderRadius="12px";
sticker.style.boxShadow="0 0 20px rgba(255,255,255,0.2)";
}

/* LOAD SAVED */
const savedText = localStorage.getItem("reminderText");
const savedTheme = localStorage.getItem("reminderTheme");

if(savedText){
applySticker(savedText, savedTheme || "t1");
}



// STAR BACKGROUND
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
window.addEventListener("resize",()=>{
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
drawStars();
});
const stars = [];

for (let i = 0; i < 200; i++) {
    stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        radius: Math.random() * 1.5
    });
}

function drawStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "white";

    stars.forEach(star => {
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
        ctx.fill();
    });
}

drawStars();

</script>

<div id="reminderPopup" class="popup">

<div class="popupBox">

<input id="reminderInput" placeholder="Your reminder...">

<div class="themes">
<div class="theme t1" onclick="selectTheme('t1')"></div>
<div class="theme t2" onclick="selectTheme('t2')"></div>

</body>
