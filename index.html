<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Future Self</title>
<style>
body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    color: white;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  background: #000000;
}
   #stars {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    background: radial-gradient(
        ellipse at center,
        rgba(255,255,255,0.08) 0%,
        rgba(255,255,255,0.03) 25%,
        #000 60%,
        #000 100%
    );
}
/* brand */
.brand {
  position: absolute;
  top: 12px;
  width: 100%;
  text-align: center;
  font-size: 14px;
  opacity: 0.9;
}

 /* GOALS tag */
  .goals-wrap {
  position: absolute;
  top: 66px;        /* EXACT: 1 inch below Vip’smind */
  left: 0;
  width: 100%;
}

 .goals-tag {
  position: absolute;
  left: 94px;     /* LEFT SIDE – FIXED */
  top: 0;
  background: #ffffff;
  color: #000;
  padding: 10px 22px 10px 36px;
  border-radius: 14px;
  font-weight: 600;
  display: inline-flex;
  align-items: center;
  z-index: 9999;
}
 

/* left arrow cut */
 .goals-tag::after {
   content: "";
 position: absolute;
   right: -20px;
   top: 0;
   width: 0;
   height: 0;
  border-top: 22px solid transparent;
   border-bottom: 22px solid transparent;
   border-left: 20px solid #ffffff;
}


/* center message */
.message {
  position: absolute;
 top: 180px;      /* EXACT: text moved down */
  width: 100%;
  text-align: center;
  font-size: 40px;
}

/* buttons */
.actions {
  position: absolute;
  top:  250px;
  width: 100%;
  display: flex;
  justify-content: center;
  gap: 60px;
}

.single {
  background-color: #0b5cff;
  padding: 16px 36px;
  border-radius: 6px;
  box-shadow:
    0 0 6px rgba(11,92,255,0.35),
    0 0 14px rgba(11,92,255,0.25);
}

.group {
  background-color: #b1122a;
  padding: 16px 36px;
  border-radius: 6px;
  box-shadow:
    0 0 6px rgba(177,18,42,0.35),
    0 0 14px rgba(177,18,42,0.25);
}

/* footer text */
.timer {
    position: absolute;
    top: 380px;
    width: 100%;
    text-align: center;
    font-size: 36px;
    color: #aaa;
}
/* Page Loader */
#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

.spinner{
width:40px;
height:40px;
border:4px solid rgba(255,255,255,0.2);
border-top:4px solid white;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}
</style>
</head>
<body>
<div id="loader">
<div class="spinner"></div>
</div>
<canvas id="stars"></canvas>
<div class="brand">Vip’smind</div>
 <div class="message">A MESSAGE TO YOUR FUTURE SELF</div>
<div class="goals-wrap">
   <div class="goals-tag">GOALS</div>
   <div class="actions">
  <div class="single" id="singleBtn">Single</div>
<div class="group" id="groupBtn">Group</div>
   </div>
   <div class="timer" id="timer"></div>
 </div>
 <script>
if (!sessionStorage.getItem("exitPressed")) {
    window.history.pushState(null, null, window.location.href);

    window.onpopstate = function () {
        window.history.pushState(null, null, window.location.href);
    };
}
const timerEl = document.getElementById("timer");
const singleBtn = document.getElementById("singleBtn");
const groupBtn = document.getElementById("groupBtn");
const goalsBtn = document.querySelector(".goals-tag");

const unlockTime = Number(localStorage.getItem("unlockTime"));

/* GOALS BUTTON */
goalsBtn.onclick = function () {
playClick();
    if (!unlockTime || unlockTime <= 0) {

        // blink effect
        timerEl.style.transition = "0.2s";
        timerEl.style.transform = "scale(1.2)";
        setTimeout(() => {
            timerEl.style.transform = "scale(1)";
        }, 200);

        setTimeout(() => {
            timerEl.style.transform = "scale(1.2)";
        }, 400);

        setTimeout(() => {
            timerEl.style.transform = "scale(1)";
        }, 600);

        return;
    }

    window.location.href = "goals.html";
};


/* SINGLE BUTTON */
singleBtn.onclick = function () {
playClick();
    document.getElementById("loader").style.display="flex";

    localStorage.setItem("challengeMode", "single");

    setTimeout(()=>{
        window.location.replace("type.html");
    },600);

};


/* GROUP BUTTON */
groupBtn.onclick = function () {
playClick();
    document.getElementById("loader").style.display="flex";

    localStorage.setItem("challengeMode", "group");

    setTimeout(()=>{
       window.location.replace("type.html");
    },600);

};


function updateUI() {

    if (!unlockTime || unlockTime <= 0) {
        timerEl.innerText = "No challenge placed";
        singleBtn.style.display = "inline-block";
        groupBtn.style.display = "inline-block";
        return;
    }

    const now = Date.now();

    if (now >= unlockTime) {

        timerEl.innerHTML =
            "Challenge is unlocked<br><br>Please check the challenge in Goals";

        singleBtn.style.display = "none";
        groupBtn.style.display = "none";
        return;
    }

    // LOCKED STATE
    singleBtn.style.display = "none";
    groupBtn.style.display = "none";

    const diff = unlockTime - now;

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const minutes = Math.floor((diff / (1000 * 60)) % 60);
    const seconds = Math.floor((diff / 1000) % 60);

    timerEl.innerHTML =
        "The Challenge is Locked<br><br>" +
        "Days : " + days +
        " | Hours : " + hours +
        " | Minutes : " + minutes +
        " | Seconds : " + seconds +
        "<br><br>To Unlock";
}

updateUI();
setInterval(updateUI, 1000);

// STAR BACKGROUND
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

//  NORMAL STARS
const stars = [];
for (let i = 0; i < 180; i++) {
    stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        radius: Math.random() * 1.2 + 0.2,
       speed: Math.random() * 0.10 + 0.02
    });
}

//  DRAW FUNCTION
function drawStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "white";

    //  draw normal stars
    stars.forEach(star => {

        ctx.beginPath();
        ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
        ctx.shadowBlur = 2;
        ctx.shadowColor = "white";
        ctx.fill();

        // movement
        star.x += star.speed;
        star.y -= star.speed;

        if (star.y < 0 || star.x > canvas.width) {
            star.x = Math.random() * canvas.width;
            star.y = canvas.height;
        }
    });

    ctx.shadowBlur = 0;

    }


//  ANIMATION LOOP
function animate() {
    drawStars();
    requestAnimationFrame(animate);
}

animate();

animate();
function playClick() {
  const sound = document.getElementById("clickSound");
  if (!sound) return;

  sound.currentTime = 0;
  sound.play();
}
</script>                                                                                                                                           <script type="module">

</body>
