<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Single Video</title>

<style>
body{
    background:#000;
    color:#fff;
    font-family:sans-serif;
    text-align:center;
}

.box{
    margin:60px auto;
    width:90%;
    max-width:400px;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:none;
    border-radius:5px;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:5px;
    background:#0047ab;
    color:#fff;
    font-size:16px;
}

.red{
    background:red;
}
/* Page Loader */
#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

.spinner{
width:40px;
height:40px;
border:4px solid rgba(255,255,255,0.2);
border-top:4px solid white;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}
</style>
</head>

<body>
<div id="loader">
<div class="spinner"></div>
</div>
<div class="box" id="mainBox">

<h2>Single Video Message</h2>

<input id="userName" placeholder="Enter your name">

<video id="preview" autoplay muted style="display:none;width:100%;margin-top:10px;"></video>

<button id="recordBtn">Start Recording</button>

</div>

<!-- âœ… ADDED POPUP (OUTSIDE mainBox) -->
<div id="exitPopup" style="
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(6px);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
">

  <div style="
  width:85%;
  max-width:320px;
  background:#111;
  border:1px solid #444;
  padding:20px;
  border-radius:12px;
  position:relative;
  text-align:center;
  ">

    <div onclick="closeExit()" style="
    position:absolute;
    top:10px;
    right:12px;
    font-size:18px;
    cursor:pointer;
    color:#aaa;
    "></div>

    <h3>Exit Confirmation</h3>

    <p>
    Are you sure you want to exit?<br>
    Your progress will be lost.
    </p>

    <button onclick="confirmExit()" style="
    margin-top:18px;
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#facc15;
    color:black;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    ">
    Back
    </button>

  </div>
</div>

<script>

// FIXED BACK CONTROL

//  ADD THIS LINE (VERY IMPORTANT)
if (!sessionStorage.getItem("backInit")) {
    history.pushState(null, null, location.href);
    sessionStorage.setItem("backInit", "true");
}
let timerBackCount = 0;

window.addEventListener("popstate", function () {

    const recordBtn = document.getElementById("recordBtn");
    const unlockInput = document.getElementById("unlockInput");
    const popup = document.getElementById("exitPopup");

    // STOP if popup already open
    if (popup && popup.style.display === "flex") {
        return;
    }

  // ================= TIMER SCREEN =================
if (document.getElementById("unlockInput") !== null) {
    timerBackCount++;

    if (timerBackCount === 1) {
        history.pushState(null, null, location.href);
        return;
    }

    popup.style.display = "flex";
    history.pushState(null, null, location.href); //  FIX
    return;
}

    // ================= RECORDING SCREEN =================
if (recordBtn && recordBtn.innerText === "Stop Recording") {
    if (popup) popup.style.display = "flex";
    history.pushState(null, null, location.href); //  VERY IMPORTANT
    return;
}

    // ================= START SCREEN =================
    window.location.replace("index.html");

});
function confirmExit() {
    sessionStorage.removeItem("backInit");
    window.location.replace("index.html");
}
function closeExit() {
    const popup = document.getElementById("exitPopup");
    if (popup) popup.style.display = "none";

    timerBackCount = 0; // VERY IMPORTANT RESET
}
// ðŸ”¥ YOUR ORIGINAL CODE (UNCHANGED BELOW)

const recordBtn = document.getElementById("recordBtn");
const preview = document.getElementById("preview");
const userName = document.getElementById("userName");

let mediaRecorder;
let recordedChunks = [];
let stream;
/* ================= INDEXED DB SETUP ================= */

let db;

const request = indexedDB.open("VipsMindDB", 1);

request.onupgradeneeded = function (event) {
    db = event.target.result;
    if (!db.objectStoreNames.contains("videos")) {
        db.createObjectStore("videos", { keyPath: "id" });
    }
};

request.onsuccess = function (event) {
    db = event.target.result;
};
/* ================= RECORD BUTTON ================= */

recordBtn.onclick = async function () {

    if (!userName.value.trim()) {
        alert("Enter your name");
        return;
    }

    /* ================= START RECORDING ================= */
    if (recordBtn.innerText === "Start Recording") {

        try {
            stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "user" },
                audio: true
            });
        } catch (err) {
            alert("Camera permission denied or not available");
            return;
        }

        preview.style.display = "block";
        preview.srcObject = stream;

        recordedChunks = [];

        try {
            mediaRecorder = new MediaRecorder(stream, {
                mimeType: "video/webm;codecs=vp8"
            });
        } catch (e) {
            mediaRecorder = new MediaRecorder(stream);
        }

        mediaRecorder.ondataavailable = function (e) {
            if (e.data && e.data.size > 0) {
                recordedChunks.push(e.data);
            }
        };

        mediaRecorder.onstop = function () {

            const blob = new Blob(recordedChunks, { type: "video/webm" });

           const transaction = db.transaction(["videos"], "readwrite");
const store = transaction.objectStore("videos");

store.put({
    id: "singleVideo",
    blob: blob
});

localStorage.setItem("singleName", userName.value.trim());
localStorage.setItem("challengeMode", "single-video");

stream.getTracks().forEach(track => track.stop());
preview.srcObject = null;
preview.style.display = "none";
showTimerScreen();
        };

        mediaRecorder.start();

        recordBtn.innerText = "Stop Recording";

    }

    /* ================= STOP RECORDING ================= */
    else {

        if (mediaRecorder && mediaRecorder.state !== "inactive") {
            mediaRecorder.stop();
        }

        recordBtn.innerText = "Start Recording";
    }
};


/* ================= TIMER SCREEN ================= */

function showTimerScreen() {

    document.getElementById("mainBox").innerHTML = `
        <h2>Set Unlock Time</h2>
        <input type="datetime-local" id="unlockInput">
        <button class="red" onclick="lockChallenge()">Set Unlock Timer</button>
    `;
   
    timerBackCount = 0;
}


/* ================= LOCK CHALLENGE ================= */

function lockChallenge() {

    const unlock = document.getElementById("unlockInput").value;

    if (!unlock) {
        alert("Select unlock time");
        return;
    }

    localStorage.setItem("lockTime", Date.now());
    localStorage.setItem("unlockTime", new Date(unlock).getTime());
    localStorage.setItem("challengeStatus", "locked");

  document.getElementById("loader").style.display="flex";

setTimeout(()=>{
window.location.replace("goals.html");
},600);
}

</script>
</body>
</html>
