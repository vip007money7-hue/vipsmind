<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Select Type</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: black;
    color: white;
    font-family: system-ui;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    text-align: center;
}

h2 {
    margin-bottom: 40px;
    font-size: 28px;
}

.buttons {
    display: flex;
    gap: 40px;
    justify-content: center;
}

button {
    padding: 16px 50px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    color: white;
}

.video {
    background: #c1121f; /* red */
}

.letter {
    background: #1d4ed8; /* blue */
}
</style>
</head>

<body>

<div class="container">
    <h2>Select Your Challenge Type</h2>

    <div class="buttons">
        <!-- VIDEO LEFT -->
        <button class="video" onclick="goVideo()">Video</button>

        <!-- LETTER RIGHT -->
        <button class="letter" onclick="goLetter()">Letter</button>
    </div>
</div>
<script>
// ✅ ENTRY PROTECTION (ADD THIS)
if (!sessionStorage.getItem("allowTypePage")) {
    window.location.replace("index.html");
}
sessionStorage.removeItem("allowTypePage");
history.pushState(null, null, location.href);

window.addEventListener("popstate", function () {
    history.pushState(null, null, location.href);
    window.location.href = "index.html";
});
</script>
<script>
function playClick() {
  const sound = document.getElementById("clickSound");
  if (!sound) return;

  sound.currentTime = 0;
  sound.play();
}
const mode = localStorage.getItem("challengeMode");

/* LETTER BUTTON */
function goLetter() {
playClick();
    if (mode === "single") {
        // Single → direct
window.location.replace("single.html");

    } else {
        // Group → save type → go to setup
        localStorage.setItem("groupType", "letter");
        window.location.replace("group-setup.html");
    }
}


/* VIDEO BUTTON */
function goVideo() {
playClick();
    if (mode === "single") {
        // Single → direct
        window.location.replace("single-video.html");

    } else {
        // Group → save type → go to setup
        localStorage.setItem("groupType", "video");
        window.location.replace("group-setup.html");
    }
}
</script>
<audio id="clickSound" src="click.mp3"></audio>
</body>
</html>
