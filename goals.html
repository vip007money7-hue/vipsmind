<!DOCTYPE html>
<html>
<head>
    <title>Goals</title>
    <style>
        body {
            background: black;
            color: white;
            font-family: Arial;
            text-align: center;
        }
        #stars{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            z-index:-1;
        }
        .box {
            margin-top: 80px;
        }
        button {
            padding: 10px 20px;
            background: white;
            color: black;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        #loading {
            color: #aaa;
            margin-top: 20px;
        }
    </style>
</head>

<body>
<canvas id="stars"></canvas>
<div class="box">
    <div id="nameBox"></div>
    <div id="dates"></div>
    <div id="loading">Loading challenge...</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAqtkCHpIelkDUsm2pPiZjmW6RqSXXGoZY",
  authDomain: "vipsmind-b34fc.firebaseapp.com",
  projectId: "vipsmind-b34fc",
  storageBucket: "vipsmind-b34fc.firebasestorage.app",
  messagingSenderId: "257825847385",
  appId: "1:257825847385:web:ee3592957535a99e915948"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.onload = async function() {
    const nameBox = document.getElementById("nameBox");
    const dates = document.getElementById("dates");
    const loading = document.getElementById("loading");

    const uid = localStorage.getItem("uid");
    let mode = localStorage.getItem("challengeMode");
    let lock = Number(localStorage.getItem("lockTime"));
    let unlock = Number(localStorage.getItem("unlockTime"));
    const now = Date.now();

    // Try to load from Firebase first
    if (uid) {
        try {
            const docRef = doc(db, "users", uid);
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) {
                const data = docSnap.data();
                if (data.challengeMode) mode = data.challengeMode;
                if (data.lockTime) lock = Number(data.lockTime);
                if (data.unlockTime) unlock = Number(data.unlockTime);
                if (data.singleName) localStorage.setItem("singleName", data.singleName);
                if (data.letter) localStorage.setItem("letter", data.letter);
            }
        } catch(e) {
            console.log("Firebase read failed, using localStorage");
        }
    }

    loading.style.display = "none";

    if (!mode) {
        dates.innerText = "No challenge placed";
        return;
    }

    // Show Name
    if (mode === "group-write" || mode === "group-video") {
        const groupName = localStorage.getItem("groupName");
        nameBox.innerText = groupName ? "Dear " + groupName : "";
    } else if (mode === "single" || mode === "single-video") {
        const singleName = localStorage.getItem("singleName");
        nameBox.innerText = singleName ? "Dear " + singleName : "";
    }

    function format(d) {
        const date = new Date(d);
        const day = String(date.getDate()).padStart(2, "0");
        const month = String(date.getMonth() + 1).padStart(2, "0");
        const year = date.getFullYear();
        let hours = date.getHours();
        const minutes = String(date.getMinutes()).padStart(2, "0");
        const ampm = hours >= 12 ? "PM" : "AM";
        hours = hours % 12 || 12;
        return `${day}/${month}/${year} ${hours}:${minutes} ${ampm}`;
    }

    if (!lock || !unlock) {
        dates.innerText = "No challenge placed";
        return;
    }

    if (now < unlock) {
        dates.innerHTML = `<br>Your challenge is locked<br><br>Locked At: ${format(lock)}<br><br>Unlocks On: ${format(unlock)}`;
    } else {
        dates.innerHTML = `<br>Your challenge unlocked<br><br>Locked At: ${format(lock)}<br><br><button onclick="startViewing()">Start Viewing</button>`;
    }
};

function startViewing() {
    window.location.href = "view.html";
}
</script>

<script>
history.pushState(null, null, location.href);
window.onpopstate = function () {
    window.location.href = "index.html";
};
</script>

<script>
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const stars = [];
for (let i = 0; i < 250; i++) {
    stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 1.2,
        speed: (Math.random() * 0.15 + 0.05) * (Math.random() < 0.1 ? 2.2 : 1.75)
    });
}

function drawStars(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = "white";
    stars.forEach(star => {
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
        ctx.fill();
        star.y -= star.speed;
        star.x += star.speed * 0.6;
        if (star.y < 0 || star.x > canvas.width) {
            star.y = canvas.height;
            star.x = Math.random() * canvas.width * 0.3;
        }
    });
    setTimeout(() => requestAnimationFrame(drawStars), 40);
}
drawStars();
</script>

<audio id="clickSound" src="click.mp3"></audio>
</body>
</html>
