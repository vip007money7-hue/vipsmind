<!DOCTYPE html>
<html>
<head>
    <title>Goals</title>
    <style>
        body {
            background: black;
            color: white;
            font-family: Arial;
            text-align: center;
        }
#stars{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:-1;
}
        .box {
            margin-top: 80px;
        }

        button {
            padding: 10px 20px;
            background: white;
            color: black;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
</style>
</head>

<body>
<canvas id="stars"></canvas>
<div class="box">
    <div id="nameBox"></div>
    <div id="dates"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyAqtkCHpIelkDUsm2pPiZjmW6RqSXXGoZY",
    authDomain: "vipsmind-b34fc.firebaseapp.com",
    projectId: "vipsmind-b34fc",
    storageBucket: "vipsmind-b34fc.firebasestorage.app",
    messagingSenderId: "257825847385",
    appId: "1:257825847385:web:ee3592957535a99e915948",
    measurementId: "G-3XVCQ0TCTV"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.onload = function() {
    const nameBox = document.getElementById("nameBox");
    const dates = document.getElementById("dates");
    const mode = localStorage.getItem("challengeMode");

    if (!mode) {
        dates.innerText = "No challenge placed";
        return;
    }

    function format(d) {
        const date = new Date(d);
        const day = String(date.getDate()).padStart(2, "0");
        const month = String(date.getMonth() + 1).padStart(2, "0");
        const year = date.getFullYear();

        let hours = date.getHours();
        const minutes = String(date.getMinutes()).padStart(2, "0");

        const ampm = hours >= 12 ? "PM" : "AM";
        hours = hours % 12;
        hours = hours ? hours : 12;

        return day + "/" + month + "/" + year + " " + hours + ":" + minutes + " " + ampm;
    }

    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            window.location.replace("login.html");
            return;
        }

        const uid = user.uid;
        let data = {};

        try {
            const snap = await getDoc(doc(db, "users", uid));
            if (snap.exists()) data = snap.data();
        } catch (e) {}

        const unlock = Number(data.unlockTime || localStorage.getItem("unlockTime"));
        const lock = Number(data.lockTime || localStorage.getItem("lockTime"));
        const now = Date.now();

        const savedMode = data.challengeMode || localStorage.getItem("challengeMode");

        if (savedMode === "group-write" || savedMode === "group-video") {
            const groupName = data.groupName || localStorage.getItem("groupName");
            nameBox.innerText = groupName ? "Dear " + groupName : "";
        } else if (savedMode === "single" || savedMode === "single-video") {
            const singleName = data.singleName || localStorage.getItem("singleName");
            nameBox.innerText = singleName ? "Dear " + singleName : "";
        }

        if (!lock || !unlock) {
            dates.innerText = "No challenge placed";

            let count = 0;
            const blink = setInterval(() => {
                dates.style.visibility =
                    dates.style.visibility === "hidden" ? "visible" : "hidden";
                count++;
                if (count === 4) {
                    clearInterval(blink);
                    dates.style.visibility = "visible";
                }
            }, 300);

            return;
        }

        if (now < unlock) {
            dates.innerHTML =
                "<br>Your challenge is locked<br><br>" +
                "Challenge Locked At: " + format(lock) + "<br><br>" +
                "Unlocks On: " + format(unlock);
        } else {
            dates.innerHTML =
                "<br>Your challenge unlocked<br><br>" +
                "Challenge Locked At: " + format(lock) +
                "<br><br>" +
                "<button onclick='playClick(); startViewing()'>Start Viewing</button>";
        }
    });
};

function startViewing() {
    window.location.href = "view.html";
}

function playClick() {
    const sound = document.getElementById("clickSound");
    if (!sound) return;
    sound.currentTime = 0;
    sound.play();
}
</script>

<script>
history.pushState(null, null, location.href);

window.onpopstate = function () {
    window.location.href = "index.html";
};
</script>

<script>
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const stars = [];

for (let i = 0; i < 250; i++) {
    stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 1.2,
        speed: (Math.random() * 0.15 + 0.05) * (Math.random() < 0.1 ? 2.2 : 1.75)
    });
}

function drawStars(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    stars.forEach(star => {
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
        ctx.fillStyle = "white";
        ctx.fill();

        star.y -= star.speed;
        star.x += star.speed * 0.6;

        if (star.y < 0 || star.x > canvas.width) {
            star.y = canvas.height;
            star.x = Math.random() * canvas.width * 0.3;
        }
    });

    setTimeout(() => {
        requestAnimationFrame(drawStars);
    }, 40);
}

drawStars();
</script>
<audio id="clickSound" src="click.mp3"></audio>
</body>
</html>
