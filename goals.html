<!DOCTYPE html>
<html>
<head>
    <title>Goals</title>
    <style>
        body {
            background: black;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        #stars{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            z-index:-1;
        }
        .box {
            margin-top: 80px;
            padding: 20px;
        }
        button {
            padding: 12px 24px;
            background: #0d6efd;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 15px;
        }
        #loader{
            position:fixed;
            top:0; left:0;
            width:100%; height:100%;
            background:rgba(0,0,0,0.9);
            display:none;
            align-items:center;
            justify-content:center;
            z-index:9999;
        }
        .spinner{
            width:40px; height:40px;
            border:4px solid rgba(255,255,255,0.2);
            border-top:4px solid white;
            border-radius:50%;
            animation:spin 1s linear infinite;
        }
        @keyframes spin{0%{transform:rotate(0deg);} 100%{transform:rotate(360deg);}}
    </style>
</head>
<body>
<div id="loader">
    <div class="spinner"></div>
</div>
<canvas id="stars"></canvas>

<div class="box">
    <div id="nameBox"></div>
    <div id="dates"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAqtkCHpIelkDUsm2pPiZjmW6RqSXXGoZY",
  authDomain: "vipsmind-b34fc.firebaseapp.com",
  projectId: "vipsmind-b34fc",
  storageBucket: "vipsmind-b34fc.firebasestorage.app",
  messagingSenderId: "257825847385",
  appId: "1:257825847385:web:ee3592957535a99e915948"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const nameBox = document.getElementById("nameBox");
const dates = document.getElementById("dates");
const loader = document.getElementById("loader");

async function loadChallenge() {
    loader.style.display = "flex";

    const uid = localStorage.getItem("uid");
    if (!uid) {
        dates.innerHTML = "<br>Please login first";
        loader.style.display = "none";
        return;
    }

    try {
        const docRef = doc(db, "users", uid);
        const docSnap = await getDoc(docRef);

        let data = {};
        if (docSnap.exists()) {
            data = docSnap.data();
        }

        // Merge with localStorage as backup
        const mode = data.challengeMode || localStorage.getItem("challengeMode");

        if (!mode) {
            dates.innerHTML = "No challenge placed yet";
            loader.style.display = "none";
            return;
        }

        const lockTime = data.lockTime || Number(localStorage.getItem("lockTime"));
        const unlockTime = data.unlockTime || Number(localStorage.getItem("unlockTime"));
        const now = Date.now();

        // Show Name
        if (mode.includes("group")) {
            nameBox.innerHTML = `<h2>Dear ${data.groupName || localStorage.getItem("groupName") || "Group"}</h2>`;
        } else {
            nameBox.innerHTML = `<h2>Dear ${data.singleName || localStorage.getItem("singleName") || "User"}</h2>`;
        }

        function format(d) {
            const date = new Date(d);
            const day = String(date.getDate()).padStart(2, "0");
            const month = String(date.getMonth() + 1).padStart(2, "0");
            const year = date.getFullYear();
            let hours = date.getHours();
            const minutes = String(date.getMinutes()).padStart(2, "0");
            const ampm = hours >= 12 ? "PM" : "AM";
            hours = hours % 12 || 12;
            return `${day}/${month}/${year} ${hours}:${minutes} ${ampm}`;
        }

        if (!lockTime || !unlockTime) {
            dates.innerHTML = "No challenge placed";
        } else if (now < unlockTime) {
            // Locked
            dates.innerHTML = `
                <br>Your challenge is locked<br><br>
                Challenge Locked At: ${format(lockTime)}<br><br>
                Unlocks On: ${format(unlockTime)}
            `;
        } else {
            // Unlocked
            dates.innerHTML = `
                <br>Your challenge is unlocked<br><br>
                Challenge Locked At: ${format(lockTime)}<br><br>
                <button onclick="startViewing()">Start Viewing</button>
            `;
        }

    } catch (e) {
        console.log("Firebase load error, using localStorage");
        // Fallback to old localStorage logic if needed
        window.location.reload(); // temporary fallback
    }

    loader.style.display = "none";
}

// Run on load
window.onload = loadChallenge;

function startViewing() {
    window.location.href = "view.html";
}

function playClick() {
  const sound = document.getElementById("clickSound");
  if (sound) {
    sound.currentTime = 0;
    sound.play();
  }
}
</script>

<!-- Star Background -->
<script>
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const stars = [];
for (let i = 0; i < 250; i++) {
    stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 1.2,
        speed: (Math.random() * 0.15 + 0.05) * (Math.random() < 0.1 ? 2.2 : 1.75)
    });
}

function drawStars(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    stars.forEach(star => {
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
        ctx.fillStyle = "white";
        ctx.fill();

        star.y -= star.speed;
        star.x += star.speed * 0.6;

        if (star.y < 0 || star.x > canvas.width) {
            star.y = canvas.height;
            star.x = Math.random() * canvas.width * 0.3;
        }
    });
    setTimeout(() => requestAnimationFrame(drawStars), 40);
}
drawStars();
</script>

<audio id="clickSound" src="click.mp3"></audio>
</body>
</html>
