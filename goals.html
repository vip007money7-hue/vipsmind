<!DOCTYPE html>
<html>
<head>
    <title>Goals</title>
    <style>
        body {
            background: black;
            color: white;
            font-family: Arial;
            text-align: center;
        }
#stars{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:-1;
}
        .box {
            margin-top: 80px;
        }

        button {
            padding: 10px 20px;
            background: white;
            color: black;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>

<body>
<canvas id="stars"></canvas>
<div class="box">
    <div id="nameBox"></div>
    <div id="dates"></div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAqtkCHpIelkDUsm2pPiZjmW6RqSXXGoZY",
  authDomain: "vipsmind-b34fc.firebaseapp.com",
  projectId: "vipsmind-b34fc"
};

const app = initializeApp(firebaseConfig);
window.db = getFirestore(app);
window.doc = doc;
window.getDoc = getDoc;
</script>
<script>
window.onload = async function() {
const nameBox = document.getElementById("nameBox");
const dates = document.getElementById("dates");

const uid = localStorage.getItem("uid");

if (!uid) {
    dates.innerText = "Login required";
    return;
}

try {
const docRef = window.doc(window.db, "users", uid);
const snap = await window.getDoc(docRef);

    if (!snap.exists()) {
        dates.innerText = "No challenge placed";
        return;
    }

    const data = snap.data();

    const mode = data.challengeMode;
    const lock = data.lockTime;
    const unlock = data.unlockTime;
    const now = Date.now();

    // ===== SHOW NAME =====
    if (mode === "group-write" || mode === "group-video") {
        nameBox.innerText = data.groupName ? "Dear " + data.groupName : "";
    }
    else if (mode === "single" || mode === "single-video") {
        nameBox.innerText = data.singleName ? "Dear " + data.singleName : "";
    }

    // continue SAME logic...

    function format(d) {
        const date = new Date(d);
        const day = String(date.getDate()).padStart(2, "0");
        const month = String(date.getMonth() + 1).padStart(2, "0");
        const year = date.getFullYear();

        let hours = date.getHours();
        const minutes = String(date.getMinutes()).padStart(2, "0");

        const ampm = hours >= 12 ? "PM" : "AM";
        hours = hours % 12;
        hours = hours ? hours : 12;

        return day + "/" + month + "/" + year + " " +
               hours + ":" + minutes + " " + ampm;
    }

    // ===== NO CHALLENGE =====
    if (!lock || !unlock) {

        dates.innerText = "No challenge placed";

        let count = 0;
        const blink = setInterval(() => {
            dates.style.visibility =
                dates.style.visibility === "hidden" ? "visible" : "hidden";
            count++;
            if (count === 4) {
                clearInterval(blink);
                dates.style.visibility = "visible";
            }
        }, 300);

        return;
    }

    // ===== LOCKED =====
    if (now < unlock) {

        dates.innerHTML =
            "<br>Your challenge is locked<br><br>" +
            "Challenge Locked At: " + format(lock) + "<br><br>" +
            "Unlocks On: " + format(unlock);

    }
    else {

        dates.innerHTML =
            "<br>Your challenge unlocked<br><br>" +
            "Challenge Locked At: " + format(lock) +
            "<br><br>" +
            "<button onclick='playClick(); startViewing()'>Start Viewing</button>";
    }
}
catch (e) {
    dates.innerText = "Error loading data";
    console.error(e);
}
};
function startViewing() {
    window.location.href = "view.html";
}
function playClick() {
  const sound = document.getElementById("clickSound");
  if (!sound) return;

  sound.currentTime = 0;
  sound.play();
}
</script>

<script>
history.pushState(null, null, location.href);

window.onpopstate = function () {
    window.location.href = "index.html";
};
</script>
<script>
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const stars = [];

for (let i = 0; i < 250; i++) {
    stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 1.2,   // very small stars
     speed: (Math.random() * 0.15 + 0.05) * (Math.random() < 0.1 ? 2.2 : 1.75)// slow movement
    });
}

function drawStars(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    stars.forEach(star => {

        // ⭐ draw tiny star (realistic dot)
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
        ctx.fillStyle = "white";
        ctx.fill();

        // 🌌 gentle floating movement (no lines)
        star.y -= star.speed;        // move UP
star.x += star.speed * 0.6;  // move RIGHT (slower than Y for smooth angle)

        // 🔁 reset when out of screen
       if (star.y < 0 || star.x > canvas.width) {
    star.y = canvas.height;          // restart from bottom
    star.x = Math.random() * canvas.width * 0.3; // start more from left side
}
    });

    // 🎬 smooth animation (~24fps feel)
    setTimeout(() => {
        requestAnimationFrame(drawStars);
    }, 40);
}

drawStars();
</script>
<audio id="clickSound" src="click.mp3"></audio>
</body>
</html>
