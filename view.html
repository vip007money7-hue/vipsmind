};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const container = document.getElementById("content");
let mode = localStorage.getItem("challengeMode") || "";

async function loadChallenge() {
    const uid = localStorage.getItem("uid");
    if (uid) {
        try {
            const docRef = doc(db, "users", uid);
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) {
                const data = docSnap.data();
                if (data.challengeMode) mode = data.challengeMode;
                if (data.singleName) localStorage.setItem("singleName", data.singleName);
                if (data.letter) localStorage.setItem("letter", data.letter);
                if (data.groupName) localStorage.setItem("groupName", data.groupName);
                if (data.groupLetters) localStorage.setItem("groupLetters", JSON.stringify(data.groupLetters || []));
            }
        } catch(e) {
            console.log("Using localStorage backup");
        }
    }

    document.getElementById("loading").style.display = "none";

    if (!mode) {
        container.innerHTML = "<h3>No challenge found</h3>";
        return;
    }

    // Rest of your existing view logic stays the same
    showStartScreen();
}

function showStartScreen() {
    const title = localStorage.getItem("singleName") || localStorage.getItem("groupName") || "VIP";
    container.innerHTML = `
        <h2>Dear ${title}</h2>
        <h3>Your Challenge is Unlocked</h3>
        <button id="startBtn">Start Viewing</button>
    `;
    document.getElementById("startBtn").onclick = startViewing;
}

}
