<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Group Video</title>

<style>
body{
    margin:0;
    min-height:100vh;
    background:#000;
    color:#fff;
    font-family:sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
}

.box{
    width:90%;
    max-width:400px;
    background:rgba(0,0,0,0.85);
    padding:20px;
    border-radius:12px;
    text-align:center;
}

input,button{
    width:100%;
    padding:10px;
    margin-top:12px;
    font-size:16px;
    border:none;
    border-radius:6px;
}

input{
    background:#fff;
    color:#000;
}

button{
    background:#0d6efd;
    color:#fff;
}

button.red{
    background:#dc3545;
}

.blurBox{
    margin-top:20px;
    padding:20px;
    background:rgba(255,255,255,0.1);
    filter:blur(4px);
}
video{
    width:100%;
    margin-top:10px;
}
/* Page Loader */
#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

.spinner{
width:40px;
height:40px;
border:4px solid rgba(255,255,255,0.2);
border-top:4px solid white;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}
</style>
</head>

<body>
<div id="loader">
<div class="spinner"></div>
</div>


<div class="box" id="mainBox">

<h2 id="stepText"></h2>

<input id="userName" placeholder="Enter your name">

<video id="preview" autoplay muted style="display:none;"></video>

<button id="recordBtn">Start Recording</button>

</div>

<script>

const total = Number(localStorage.getItem("memberCount")) || 0;
if (!total || total <= 0) {
    alert("Invalid group setup");
    window.location.href = "group-setup.html";
}
// FIX: Proper index handling
let index = Number(localStorage.getItem("currentIndex"));
if (!index || index < 1) {
    index = 1;
    localStorage.setItem("currentIndex", 1);
}

const stepText = document.getElementById("stepText");
const recordBtn = document.getElementById("recordBtn");
const preview = document.getElementById("preview");
const userName = document.getElementById("userName");

let mediaRecorder;
let recordedChunks = [];
let stream;
// ===== BACK BUTTON DOUBLE PRESS POP - FIXED =====
let backPressCount = 0;

history.replaceState(null, null, location.href);   // Better initial seal

window.addEventListener("popstate", function () {

    backPressCount++;

    if (backPressCount === 1) {
        history.pushState(null, null, location.href);   // First press: block navigation
        return;
    }

    if (backPressCount === 2) {
        const popup = document.getElementById("exitPopup");
        if (popup) popup.style.display = "flex";
        history.pushState(null, null, location.href);   // Prevent actual back
        backPressCount = 0;
        return;
    }
});
function resetBackCount() {
    backPressCount = 0;
}
/* ================= INDEXED DB SETUP ================= */

let db;

const request = indexedDB.open("VipsMindDB", 1);

request.onupgradeneeded = function (event) {
    db = event.target.result;
    if (!db.objectStoreNames.contains("videos")) {
        db.createObjectStore("videos", { keyPath: "id" });
    }
};
request.onerror = function () {
    alert("Database error. Please reload page.");
};
request.onsuccess = function (event) {
    db = event.target.result;
};

/* ================= STEP TEXT ================= */

function updateStep() {
    stepText.innerText = index + " of " + total;
}
updateStep();

/* ================= RECORD BUTTON ================= */

recordBtn.onclick = async function () {

    if (!userName.value) {
        alert("Enter your name");
        return;
    }

    // START RECORDING
    if (recordBtn.innerText.includes("Start")) {

        stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "user" },
            audio: true
        });

        preview.style.display = "block";
        preview.srcObject = stream;

        recordedChunks = [];

       if (MediaRecorder.isTypeSupported("video/webm;codecs=vp9")) {
    mediaRecorder = new MediaRecorder(stream, { mimeType: "video/webm;codecs=vp9" });
} else if (MediaRecorder.isTypeSupported("video/webm;codecs=vp8")) {
    mediaRecorder = new MediaRecorder(stream, { mimeType: "video/webm;codecs=vp8" });
} else {
    mediaRecorder = new MediaRecorder(stream);
}

        mediaRecorder.ondataavailable = e => {
            if (e.data && e.data.size > 0) {
                recordedChunks.push(e.data);
            }
        };

        mediaRecorder.start();
        recordBtn.innerText = "Stop Recording";

    } else {

        // STOP RECORDING
        mediaRecorder.stop();

        mediaRecorder.onstop = function () {

            stream.getTracks().forEach(track => track.stop());

         const blob = new Blob(recordedChunks, { type: "video/webm" });

            // SAVE VIDEO TO INDEXED DB
            const transaction = db.transaction(["videos"], "readwrite");
            const store = transaction.objectStore("videos");

            store.put({
                id: "groupVideo_" + index,
                blob: blob
            });

            // Save name only in localStorage
            let videos = JSON.parse(localStorage.getItem("groupVideos") || "[]");

            videos.push({
              name: userName.value.trim(),
                id: "groupVideo_" + index
            });

            localStorage.setItem("groupVideos", JSON.stringify(videos));

            recordedChunks = [];
            showSavedScreen();
        };

        recordBtn.innerText = "Start Recording";
    }
};

/* ================= AFTER SAVE SCREEN ================= */

function showSavedScreen() {

    document.getElementById("mainBox").innerHTML = `
        <h2>${index} of ${total}</h2>
        <h3>${userName.value}</h3>

        <div class="blurBox">
            Video Saved (Locked)
        </div>

        <button id="nextBtn" style="margin-top:20px;">
            ${index === total ? "Continue to Set Unlock Timer" : "Continue to Next"}
        </button>
    `;

    document.getElementById("nextBtn").onclick = function () {

        if (index === total) {
            showTimer();
        } else {
            index++;
            localStorage.setItem("currentIndex", index);
            window.location.reload();
        }
    };
    resetBackCount();
}

/* ================= TIMER SCREEN ================= */

function showTimer() {

    document.getElementById("mainBox").innerHTML = `
        <h2>${total} of ${total}</h2>
        <h2>Set one timer for whole group</h2>

        <input type="datetime-local" id="unlockInput">

        <button class="red" onclick="lockChallenge()">
            Set Unlock Timer
        </button>
    `;
    resetBackCount();
}

/* ================= LOCK CHALLENGE ================= */

function lockChallenge() {

    const unlock = document.getElementById("unlockInput").value;

    if (!unlock) {
        alert("Select unlock time");
        return;
    }

    localStorage.setItem("lockTime", Date.now());
    localStorage.setItem("unlockTime", new Date(unlock).getTime());
    localStorage.setItem("challengeMode", "group-video");
    localStorage.setItem("challengeStatus", "locked");

 document.getElementById("loader").style.display="flex";

setTimeout(()=>{
window.location.replace("goals.html");
},600);
}
function closeExit() {
    document.getElementById("exitPopup").style.display = "none";
}

function confirmExit() {
    const popup = document.getElementById("exitPopup");
    if (popup) popup.style.display = "none";
    window.location.replace("index.html");
}
</script>
<div id="exitPopup" style="
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
">

  <div style="
  width:85%;
  max-width:300px;
  background:#111;
  padding:20px;
  border-radius:12px;
  text-align:center;
  ">

    <h3>Exit?</h3>

    <button onclick="confirmExit()" style="width:100%;padding:10px;margin-top:10px;background:#dc3545;color:#fff;border:none;border-radius:6px;">
    Yes Exit
    </button>

    <button onclick="closeExit()" style="width:100%;padding:10px;margin-top:10px;background:#444;color:#fff;border:none;border-radius:6px;">
    Cancel
    </button>

  </div>
</div>
</body>
</html>
